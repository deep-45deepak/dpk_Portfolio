<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="output.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-slate-800">
    <!-- NAVBAR -->

    <nav>
        <div class="bg-navbar h-auto pt-2 flex justify-between">
            <div class="md:pl-40">
                <img style="width: 10em; height: 3.5em; object-fit: cover" src="./images/dpk.45.png" alt="" />
            </div>
            <div class="text-white md:m-3 justify-between hidden md:flex">
                <ul class="mr-5 p-1 md:hover:bg-indigo-300 rounded-lg">
                    HOME
                </ul>
                <ul class="mr-5 p-1 md:hover:bg-indigo-300 rounded-lg">
                    ABOUT US
                </ul>
                <ul class="mr-5 p-1 md:hover:bg-indigo-300 rounder-lg">
                    SERVICES
                </ul>
                <ul class="mr-5 p-1 md:hover:bg-indigo-300 rounded-lg">
                    WORK
                </ul>
                <ul class="mr-5 p-1 md:hover:bg-indigo-300 rounded-lg">
                    PRICING
                </ul>
                <ul class="mr-5 p-1 md:hover:bg-indigo-300 rounded-lg">
                    TESTIMONIAL
                </ul>
                <ul class="mr-5 p-1 md:hover:bg-indigo-300 rounded-lg">
                    BLOG
                </ul>
                <ul class="mr-5 p-1 md:hover:bg-indigo-300 rounded-lg">
                    CONTACT
                </ul>
            </div>
            <div class="pr-10 pt-2 md:pr-40">
                <button><i class="fa-solid fa-bars text-white"></i></button>
            </div>
        </div>
    </nav>

    <!-- MAIN SECTION -->

    <main class="md:flex md:justify-center md:items-center md:h-screen md:flex-row-reverse">
        <!-- my Image -->
        <section>
            <div class="md:max-w-screen-sm md:h-auto">
                <img src="./images/about.png" alt="myPhoto" />
            </div>
        </section>
        <!-- about me -->
        <section class="bg-slate-800 max-w-screen-sm h-auto pl-5 mt-6 md:mt-40 md:text-left">
            <div class="flex justify-center align-middle">
                <div class="text-white text-left">
                    <h1 class="text-2xl md:text-4xl">
                        Welcome to my Portfolio <br />
                        I'm Deepak Kumar!
                    </h1>
                    <p class="text-sm text-gray-300">
                        Currently: A B.Tech student specializing in Computer Science
                        Engineering (CSE). 📖. Learning:Data Structures, Algorithms, and
                        Development.
                    </p>
                    <button class="bg-indigo-300 text-white p-2 rounded-lg mt-4">
                        Get Started
                    </button>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
